<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IELTS estimator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/5.16.0/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1.2.5/build/d3.layout.cloud.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #cloud { width: 800px; height: 500px; border: 1px solid #ccc; font-family: monospace}
    input, select, button { margin: 5px; padding: 5px; }
  </style>
</head>
<body>
  <h2>IELTS estimator</h2>
  <label>Google Sheet URL:</label>
  <input id="sheetUrl" type="text" size="60" placeholder="Paste public CSV export URL here" />
  <button onclick="fetchAndRender()">Calculate</button>

  <div id="cloud"></div>

  <script>
    let intervalId = null;
    
    Date.prototype.addDays = function(days) {
        var added = new Date(this);
        added.setDate(this.getDate() + parseInt(days));
        return added;
    };

    Date.prototype.withoutTime = function () {
        var d = new Date(this);
        d.setHours(0, 0, 0, 0);
        return d;
    }

    Date.prototype.sameDate = function(dateObj) {
        return this.withoutTime().getTime()===dateObj.withoutTime().getTime();
    };

    Date.prototype.beforeDate = function(dateObj) {
        return this.withoutTime().getTime() < dateObj.withoutTime().getTime();
    };

    Date.prototype.diffDays = function(dateObj) {
        return (this.withoutTime().getTime() - dateObj.withoutTime().getTime())/1000/60/60/24;
    };

    function fetchAndRender() {
      const url = document.getElementById('sheetUrl').value.replace(/\/edit.*$/, '/export?format=csv');
      const begin_date = new Date(2026, 3, 18); // 3 because Date starts months at 0 FFS
      const hours_per_ielts = 150;
      const owner_email = "tpatikorn@gmail.com";
      const base_ielts = 4.5;
      const unread_penalty = 0.5;
      const target_date = new Date(2026, 7, 1); // 3 because Date starts months at 0 FFS

      var rows;
      var headers;
      var data;

      fetch(url)
        .then(res => res.text())
        .then(csv => {
          rows = csv.split('\n').map(row => row.trim().split(','));
          headers = rows[0];
          data = rows.slice(1).filter(r => r[1] == owner_email);
          
          var cur_date = new Date(begin_date);
          var cur_ielts = base_ielts;
          var result = "";
          for(d=0; d < data.length; d++) {
              const reading = data[d];
              var reading_date = new Date(reading[0]);

              var unread_streak = 0;
              // compare to the day before reading_date so that reading_date could be either the same day as previous row or the next day. both no penalty.
              while(cur_date.beforeDate(reading_date.addDays(-1))) {
                  cur_date = cur_date.addDays(1);
                  unread_streak += 1;
                  var ielts_diff = -unread_penalty*unread_streak/hours_per_ielts;
                  cur_ielts += ielts_diff;
                  result += `SKIP ${cur_date.toDateString()} => new IELTS ${cur_ielts.toFixed(4)} (${ielts_diff.toFixed(4)} for skipping ${unread_streak} day(s) in a row)\n`;
              }
              
              cur_date = reading_date;
              var ielts_diff = reading[2]/hours_per_ielts;
              cur_ielts += ielts_diff;
              result += `READ ${cur_date.toDateString()} => new IELTS ${cur_ielts.toFixed(4)} (+${ielts_diff.toFixed(4)}  for reading ${reading[2]} hour(s))\n`;
          }

          const average_ielts_gain = (cur_ielts - base_ielts) / cur_date.diffDays(begin_date);
          
          result += `\nESTIMATING IELTS UNTIL ${target_date.toDateString()}\n`;
          while(cur_date.beforeDate(target_date)) {
              cur_ielts += average_ielts_gain;
              result += `READ ${cur_date.toDateString()} => new IELTS ${cur_ielts.toFixed(4)} (${average_ielts_gain < 0 ? "" : "+"}${average_ielts_gain.toFixed(4)} on average)\n`;
              cur_date = cur_date.addDays(1);
          }
          document.getElementById("cloud").innerText = result;
        });
    }
  </script>
</body>
</html>
